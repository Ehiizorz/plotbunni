<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/rabbit.svg" />
    
    <!-- Enhanced Viewport for Android -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5, user-scalable=yes" />
    
    <!-- Android Chrome Meta Tags -->
    <meta name="theme-color" content="#320832" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Plot Bunni" />
    
    <!-- Android-specific compatibility -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="x-ua-compatible" content="IE=edge" />
    
    <!-- Color Scheme -->
    <meta name="color-scheme" content="light dark" />
    
    <title>Plot Bunni</title>
    <style>
      /* Prevent unwanted pinch-zoom behavior */
      input[type="text"], 
      textarea {
        font-size: 16px;
      }
      
      body {
        background-color: hsl(var(--background));
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        /* Support safe areas on notched devices */
        padding: max(0px, env(safe-area-inset-top)) max(0px, env(safe-area-inset-right)) max(0px, env(safe-area-inset-bottom)) max(0px, env(safe-area-inset-left));
      }
      
      #loading-spinner {
        width: 48px;
        height: 48px;
        border: 5px solid hsl(var(--secondary));
        border-bottom-color: hsl(var(--primary));
        border-radius: 50%;
        display: inline-block;
        box-sizing: border-box;
        animation: rotation 1s linear infinite;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
      }

      @keyframes rotation {
        0% {
          transform: translate(-50%, -50%) rotate(0deg);
        }
        100% {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      body.loaded #loading-spinner {
        display: none;
      }
      
      #root {
        display: none;
        width: 100%;
        height: 100%;
      }
      
      body.loaded #root {
        display: block;
      }
      
      /* Prevent rubber band effect on iOS/Android */
      body, html {
        overscroll-behavior: none;
        -webkit-touch-callout: none;
      }
      
      /* Optimize input styling for mobile */
      input, textarea, select {
        -webkit-appearance: none;
        appearance: none;
        border-radius: 4px;
      }
      
      textarea {
        resize: vertical;
      }
    </style>
  </head>
  <body>
    <div id="loading-spinner"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
